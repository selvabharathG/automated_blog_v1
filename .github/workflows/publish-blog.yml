name: Publish Blog Post

on:
  schedule:
    # 8 AM SGT = 12 AM UTC
    - cron: '0 0 * * *'
  
  workflow_dispatch:  # Allow manual trigger
  
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config/**'
      - '.github/workflows/publish-blog.yml'

jobs:
  publish-blog:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      
      - name: Run research agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TIMEZONE: 'Asia/Singapore'
        run: |
          python main.py
      
      # Track the new docs folder for new blog posts written by Python
      - name: Check for changes
        id: verify_changed_files
        run: |
          if git diff --quiet docs/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      # Commit the raw .md file permanently back to GitHub branch
      - name: Commit and push changes
        if: steps.verify_changed_files.outputs.changed == 'true'
        run: |
          git add docs/*
          git commit -m "Auto: Publish daily blog post - $(date +'%Y-%m-%d')"
          git push

      # --- VITEPRESS BUILD AND DEPLOY STEPS ---
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # FIX: Force local installation of both vitepress and vue to guarantee the bundler resolves module pathways
      - name: Install VitePress and Dependencies Locally
        run: npm install vitepress vue

      - name: Compile Markdown to Premium HTML Blog
        run: npx vitepress build docs

      - name: Setup GitHub Pages Web Environment
        uses: actions/configure-pages@v4

      # CRITICAL SAFETY: Upload only the final compiled HTML code, hiding everything else!
      - name: Package HTML Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/.vitepress/dist'

      - name: Deploy Live To Internet
        uses: actions/deploy-pages@v4