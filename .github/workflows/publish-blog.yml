name: Publish Blog Post

on:
  schedule:
    # 8 AM SGT = 12 AM UTC (0:00 UTC)
    - cron: '0 0 * * *'
  
  workflow_dispatch:  # Allow manual trigger
  
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config/**'
      - '.github/workflows/publish-blog.yml'

jobs:
  publish-blog:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      
      - name: Run research agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TIMEZONE: 'Asia/Singapore'
        run: |
          python main.py
      
      # FIX 1: Track the whole blog directory for flexible change detection
      - name: Check for changes
        id: verify_changed_files
        run: |
          if git diff --quiet blog/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      # FIX 1: Commit and push all blog modifications up to the repository branch
      - name: Commit and push changes
        if: steps.verify_changed_files.outputs.changed == 'true'
        run: |
          git add blog/*
          git commit -m "Auto: Publish daily blog post - $(date +'%Y-%m-%d')"
          git push
      
      # FIX 2: Target the internal web directory structure and prepare it for server upload
      - name: Setup GitHub Pages Environment
        if: success()
        uses: actions/configure-pages@v4

      # FIX 2: Bundle ONLY the blog content folder to shield your engine codebase
      - name: Package Site Folder
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: './blog'

      # FIX 2: Push the server compilation container asset live
      - name: Deploy Isolated Blog To Internet
        if: success()
        uses: actions/deploy-pages@v4
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: blog-generation-logs
          path: logs/
          retention-days: 7
      
      - name: Notify on success
        if: success() && steps.verify_changed_files.outputs.changed == 'true'
        run: |
          echo "✅ Blog post published and deployment pushed to GitHub Pages!"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Blog generation or hosting pipeline failed"
          echo "Check logs in artifacts for details"